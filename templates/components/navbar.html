<!-- Navbar -->
<nav class="bg-white shadow-md sticky top-0 z-50" x-data="{ mobileOpen: false }">
    <div class="container mx-auto px-4">
        <div class="flex items-center justify-between h-16">
            <!-- Logo -->
            <a href="{{ url_for('main.index') }}" class="font-display text-2xl text-primary">
                {{ config.APP_NAME }}
            </a>

            <!-- Desktop nav -->
            <div class="hidden md:flex items-center space-x-6">
                <a href="{{ url_for('main.index') }}" class="text-gray-700 hover:text-primary transition">Home</a>
                <a href="{{ url_for('main.events') }}" class="text-gray-700 hover:text-primary transition">Events</a>

                {% if current_user.is_authenticated %}
                    <a href="{{ url_for('auth.profile') }}" class="text-gray-700 hover:text-primary transition">Profile</a>
                    <a href="{{ url_for('auth.logout') }}"
                       class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-pink-700 transition">Logout</a>
                {% else %}
                    <a href="{{ url_for('auth.login') }}" class="text-gray-700 hover:text-primary transition">Login</a>
                    <a href="{{ url_for('auth.register') }}"
                       class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-pink-700 transition">Register</a>
                {% endif %}
            </div>

            <!-- Mobile hamburger -->
            <button @click="mobileOpen = !mobileOpen" class="md:hidden p-2">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path x-show="!mobileOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M4 6h16M4 12h16M4 18h16"/>
                    <path x-show="mobileOpen" stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                          d="M6 18L18 6M6 6l12 12"/>
                </svg>
            </button>
        </div>

        <!-- Mobile menu -->
        <div x-show="mobileOpen" x-transition class="md:hidden pb-4 space-y-2">
            <a href="{{ url_for('main.index') }}" class="block py-2 text-gray-700 hover:text-primary">Home</a>
            <a href="{{ url_for('main.events') }}" class="block py-2 text-gray-700 hover:text-primary">Events</a>
            {% if current_user.is_authenticated %}
                <a href="{{ url_for('auth.profile') }}" class="block py-2 text-gray-700 hover:text-primary">Profile</a>
                <a href="{{ url_for('auth.logout') }}" class="block py-2 text-primary font-medium">Logout</a>
            {% else %}
                <a href="{{ url_for('auth.login') }}" class="block py-2 text-gray-700 hover:text-primary">Login</a>
                <a href="{{ url_for('auth.register') }}" class="block py-2 text-primary font-medium">Register</a>
            {% endif %}
        </div>
    </div>
</nav>
