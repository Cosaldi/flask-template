{% extends 'base.html' %}

{% block title %}Profile - {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="container mx-auto px-4 py-12 max-w-2xl">
    <div class="bg-white rounded-2xl shadow-lg p-8">
        <div class="flex items-center gap-6 mb-8">
            <div class="w-20 h-20 rounded-full bg-gradient-to-br from-primary to-pink-400 flex items-center justify-center">
                <span class="text-white text-3xl font-display">{{ current_user.username[0]|upper }}</span>
            </div>
            <div>
                <h1 class="text-2xl font-semibold">{{ current_user.username }}</h1>
                <p class="text-gray-500">{{ current_user.email }}</p>
            </div>
        </div>

        <form x-data="{ username: '{{ current_user.username }}', saving: false }"
              @submit.prevent="saving = true; fetch('/api/profile', {
                  method: 'PUT',
                  headers: {
                      'Content-Type': 'application/json',
                      'X-CSRFToken': document.querySelector('meta[name=csrf-token]').content
                  },
                  body: JSON.stringify({username: username})
              }).then(r => r.json()).then(d => {
                  saving = false;
                  if(d.error) alert(d.error);
                  else alert('Profile updated!');
              })">
            <div class="mb-6">
                <label class="block text-sm font-medium text-gray-700 mb-2">Username</label>
                <input type="text" x-model="username"
                       class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none">
            </div>

            <button type="submit" :disabled="saving"
                    class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-pink-700 transition font-medium">
                <span x-show="!saving">Save Changes</span>
                <span x-show="saving">Saving...</span>
            </button>
        </form>
    </div>
</div>
{% endblock %}
